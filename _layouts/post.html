---
layout: default
---
<style>
  .post-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 8rem 2rem 6rem;
  }
  .post-back {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sage);
    text-decoration: none;
    margin-bottom: 3rem;
  }
  .post-back:hover { color: var(--forest); }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .post-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--sage);
  }
  .post-entry {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    color: var(--sage-light);
  }
  .post-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold-light);
    padding: 0.15rem 0.5rem;
  }
  .post-body h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 2rem;
  }
  .post-body h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--forest);
    margin-top: 3rem;
    margin-bottom: 1rem;
  }
  .post-body h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--ink);
    margin-top: 2rem;
    margin-bottom: 0.75rem;
  }
  .post-body p {
    color: var(--ink-light);
    line-height: 1.85;
    margin-bottom: 1.5rem;
    font-size: 1rem;
  }
  .post-body img {
    max-width: 100%;
    height: auto;
    margin: 1.5rem 0;
    border: 1px solid var(--sage-light);
  }
  .post-body pre {
    background: var(--parchment-dark);
    border: 1px solid var(--sage-light);
    padding: 1.25rem;
    overflow-x: auto;
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.6;
  }
  .post-body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
  }
  .post-body p code {
    background: var(--parchment-dark);
    padding: 0.1em 0.3em;
    color: var(--forest);
  }
  .post-body ul, .post-body ol {
    color: var(--ink-light);
    line-height: 1.85;
    margin-bottom: 1.5rem;
    padding-left: 1.5rem;
  }
  .post-body li { margin-bottom: 0.4rem; }
  .post-body blockquote {
    border-left: 2px solid var(--sage);
    padding-left: 1.5rem;
    margin: 2rem 0;
    color: var(--ink-light);
    font-style: italic;
  }
  .post-body hr {
    border: none;
    border-top: 1px solid var(--sage-light);
    margin: 3rem 0;
  }
  .post-body strong { color: var(--ink); }
  .post-body table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    font-size: 0.88rem;
  }
  .post-body th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sage);
    border-bottom: 1px solid var(--sage-light);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }
  .post-body td {
    border-bottom: 1px solid var(--parchment-dark);
    padding: 0.5rem 0.75rem;
    color: var(--ink-light);
  }
</style>

<div class="post-wrap">
  <a class="post-back" href="{{ '/blog/' | relative_url }}">← The Diary</a>
  <div class="post-meta">
    {% if page.entry %}<span class="post-entry">Entry {{ page.entry }}</span>{% endif %}
    <time class="post-date">{{ page.date | date: "%Y-%m-%d" }}</time>
    {% if page.type %}<span class="post-type">{{ page.type }}</span>{% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</div>
