<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

  <nav>
    <a class="nav-mark" href="{{ '/' | relative_url }}">Hortora</a>
    <ul class="nav-links">
      <li><a href="{{ '/#what' | relative_url }}">About</a></li>
      <li><a href="{{ '/#repos' | relative_url }}">Repos</a></li>
      <li><a href="{{ '/docs/getting-started.html' | relative_url }}">Docs</a></li>
      <li><a href="{{ '/blog/' | relative_url }}">Diary</a></li>
      <li><a href="https://github.com/Hortora" target="_blank">GitHub</a></li>
    </ul>
  </nav>

  {{ content }}

  <footer>
    <span class="footer-mark">Hortora — tend your knowledge</span>
    <ul class="footer-links">
      <li><a href="https://github.com/Hortora" target="_blank">github</a></li>
      <li><a href="https://github.com/Hortora/spec" target="_blank">spec</a></li>
      <li><a href="https://github.com/Hortora/garden" target="_blank">garden</a></li>
    </ul>
  </footer>

</body>
</html>
