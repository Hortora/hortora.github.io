title: Hortora
description: "Hard-won technical knowledge, structured for AI. Governed. Federated. Growing."
url: "https://hortora.github.io"
baseurl: ""

permalink: /blog/:year/:month/:day/:title/

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - .superpowers/
  - _site/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
