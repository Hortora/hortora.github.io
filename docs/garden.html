<style>
/* ── Garden browser overrides ── */
.garden-outer {
  display: flex;
  margin-top: 4.5rem;
  min-height: calc(100vh - 4.5rem);
}

/* Sidebar reuse */
.garden-sidebar {
  width: 220px;
  flex-shrink: 0;
  padding: 2.5rem 1.5rem;
  border-right: 1px solid var(--sage-light);
  background: var(--parchment-dark);
  position: sticky;
  top: 4.5rem;
  height: calc(100vh - 4.5rem);
  overflow-y: auto;
}

/* Main browsing area */
.garden-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Search + filter bar */
.garden-toolbar {
  padding: 1.75rem 2.5rem 0;
  border-bottom: 1px solid var(--sage-light);
  background: var(--parchment);
  position: sticky;
  top: 4.5rem;
  z-index: 10;
}

.garden-search-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.garden-search-wrap {
  position: relative;
  flex: 1;
  max-width: 480px;
}

.garden-search-wrap svg {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--sage);
  pointer-events: none;
}

.garden-search {
  width: 100%;
  padding: 0.6rem 0.9rem 0.6rem 2.6rem;
  background: var(--parchment-dark);
  border: 1px solid var(--sage-light);
  border-radius: 4px;
  font-family: 'Lora', serif;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.garden-search:focus { border-color: var(--sage); }
.garden-search::placeholder { color: var(--sage); }

.garden-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--sage);
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* Domain filter tabs */
.garden-domains {
  display: flex;
  gap: 0;
  overflow-x: auto;
  padding-bottom: 0;
}

.domain-tab {
  padding: 0.5rem 1.1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--ink-light);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}

.domain-tab:hover { color: var(--forest); border-bottom-color: var(--sage-light); }
.domain-tab.active { color: var(--forest); border-bottom-color: var(--forest); font-weight: 600; }

.domain-tab .tab-count {
  display: inline-block;
  margin-left: 0.35rem;
  font-size: 0.65rem;
  color: var(--sage);
  font-weight: 400;
}

/* Entry grid */
.garden-entries {
  flex: 1;
  padding: 2rem 2.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  align-content: start;
}

/* Entry card */
.entry-card {
  background: white;
  border: 1px solid var(--sage-light);
  border-radius: 5px;
  padding: 1.1rem 1.25rem;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
  position: relative;
}

.entry-card:hover {
  box-shadow: 0 3px 12px rgba(60, 96, 64, 0.12);
  transform: translateY(-1px);
  border-color: var(--sage);
}

.entry-card-header {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.entry-type {
  flex-shrink: 0;
  margin-top: 0.15rem;
  padding: 0.15rem 0.45rem;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.entry-type.gotcha      { background: #FDF0E8; color: #8B4513; }

.entry-title {
  font-family: 'Lora', serif;

  line-height: 1.4;
  color: var(--ink);

}

.entry-meta {

  gap: 0.5rem;

}

.entry-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--sage);
  letter-spacing: 0.04em;
}

.entry-domain-tag {
  font-family: 'JetBrains Mono', monospace;

  border-radius: 2px;

.entry-stale-warn {

.detail-close button:hover { color: var(--ink); }

.detail-type-row {

}

.detail-id {

}

.detail-title {

.detail-body {

.detail-fields {

.detail-field-label {

.detail-tags {

}

.detail-tag {
  padding: 0.1rem 0.45rem;
  background: var(--parchment-dark);
  border: 1px solid var(--sage-light);
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;

.garden-state {

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script>
(function () {
  'use strict';

  const RAW = 'https://raw.githubusercontent.com/Hortora/garden/main';
  const GARDEN_REPO = 'Hortora/garden';

  let allEntries = [];
  let fuse = null;
  let activeDomain = 'all';
  let activeSearch = '';

  // ── Parsing ──────────────────────────────────────────────────────────────

  function parseDomains(gardenMd) {
    const m = gardenMd.match(/## By Technology\n([\s\S]*?)(?=\n## |\s*$)/);
    if (!m) return [];
    const domains = [];
    for (const match of m[1].matchAll(/^### (.+)$/gm)) {
      domains.push(match[1].trim().toLowerCase().replace(/\s+/g, '-'));
    }
    return domains;
  }

  function parseIndex(content) {
    const GE_RE = /GE-\d{8}-[0-9a-f]{6}|GE-\d{4}/;
    const entries = [];
    for (const line of content.split('\n')) {
      if (!line.startsWith('|')) continue;
      const cells = line.split('|').map(c => c.trim()).filter(Boolean);
      if (!cells.length || cells.every(c => c.startsWith('-'))) continue;
      const idMatch = cells[0].match(GE_RE) || (cells[0] !== 'GE-ID' ? null : null);
      if (!idMatch || cells[0] === 'GE-ID') continue;
      entries.push({ id: idMatch[0], title: cells[1] || '' });
    }
    return entries;
  }

  function parseFrontmatter(content) {
    const m = content.replace(/\r\n/g, '\n').match(/^---\n([\s\S]*?)\n---/);
    if (!m) return {};
    const result = {};
    for (const line of m[1].split('\n')) {
      const colon = line.indexOf(':');
      if (colon === -1) continue;
      const key = line.slice(0, colon).trim();
      let val = line.slice(colon + 1).trim();
      if (val.startsWith('[') && val.endsWith(']')) {
        result[key] = val.slice(1, -1).split(',').map(v => v.trim().replace(/['"]/g, '')).filter(Boolean);
      } else if (/^\d+$/.test(val)) {
        result[key] = parseInt(val);
      } else {
        result[key] = val.replace(/^["']|["']$/g, '');
      }
    }
    return result;
  }

  function parseBody(content) {
    const m = content.replace(/\r\n/g, '\n').match(/^---\n[\s\S]*?\n---\n([\s\S]*)$/);
    return m ? m[1].trim() : content;
  }

  // ── Staleness ─────────────────────────────────────────────────────────────

  function stalenessInfo(submitted, threshold) {
    if (!submitted || !threshold) return null;
    const ms = Date.now() - new Date(submitted).getTime();
    const days = Math.floor(ms / 86400000);
    if (days > threshold) return { level: 'stale', days };
    if (days > threshold * 0.75) return { level: 'warn', days };
    return { level: 'fresh', days };
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function typeBadgeHtml(type) {
    const t = (type || 'gotcha').toLowerCase();
    return `<span class="entry-type ${t}">${t}</span>`;
  }

  function renderCard(entry) {
    const st = stalenessInfo(entry.submitted, entry.staleness_threshold);
    let staleMeta = '';
    if (st && st.level === 'stale')
      staleMeta = `<span class="entry-stale">⚠ ${st.days}d old</span>`;
    else if (st && st.level === 'warn')
      staleMeta = `<span class="entry-stale-warn">↻ ${st.days}d old</span>`;

    const scoreLabel = entry.score ? `<span class="entry-score">${entry.score}/15</span>` : '';
    const domainTag = entry.domain ? `<span class="entry-domain-tag">${entry.domain}</span>` : '';

    return `
      <article class="entry-card" onclick="openDetail('${entry.id}','${entry.domain}')" tabindex="0"
               onkeydown="if(event.key==='Enter')openDetail('${entry.id}','${entry.domain}')">
        <div class="entry-card-header">
          ${typeBadgeHtml(entry.type)}
          <div class="entry-title">${entry.title}</div>
        </div>
        <div class="entry-meta">
          ${scoreLabel}
          ${domainTag}
          ${staleMeta}
        </div>
      </article>`;
  }

  function renderGrid(entries) {
    const grid = document.getElementById('entryGrid');
    if (!entries.length) {
      grid.innerHTML = `
        <div class="garden-state">
          <div class="garden-state-icon">🌿</div>
          <h3>No entries found</h3>
          <p>Try a different search term or domain filter.</p>
        </div>`;
      return;
    }
    grid.innerHTML = entries.map(renderCard).join('');
  }

  function applyFilters() {
    let filtered = allEntries;
    if (activeDomain !== 'all') {
      filtered = filtered.filter(e => e.domain === activeDomain);
    }
    if (activeSearch.trim() && fuse) {
      const results = fuse.search(activeSearch.trim());
      const ids = new Set(results.map(r => r.item.id));
      filtered = filtered.filter(e => ids.has(e.id));
    }
    renderGrid(filtered);
  }

  // ── Domain tabs ───────────────────────────────────────────────────────────

  function buildDomainTabs(domains) {
    const tabsEl = document.getElementById('domainTabs');
    document.getElementById('countAll').textContent = `(${allEntries.length})`;

    for (const domain of domains) {
      const count = allEntries.filter(e => e.domain === domain).length;
      if (!count) continue;
      const btn = document.createElement('button');
      btn.className = 'domain-tab';
      btn.dataset.domain = domain;
      btn.innerHTML = `${domain} <span class="tab-count">(${count})</span>`;
      btn.onclick = () => {
        activeDomain = domain;
        tabsEl.querySelectorAll('.domain-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      };
      tabsEl.appendChild(btn);
    }

    tabsEl.querySelector('[data-domain="all"]').onclick = () => {
      activeDomain = 'all';
      tabsEl.querySelectorAll('.domain-tab').forEach(t => t.classList.remove('active'));
      tabsEl.querySelector('[data-domain="all"]').classList.add('active');
      applyFilters();
    };
  }

  // ── Entry detail ──────────────────────────────────────────────────────────

  window.openDetail = async function(geId, domain) {
    const panel = document.getElementById('entryDetail');
    const entry = allEntries.find(e => e.id === geId);
    if (!entry) return;

    document.getElementById('detailType').className = `entry-type ${(entry.type||'').toLowerCase()}`;
    document.getElementById('detailType').textContent = entry.type || '';
    document.getElementById('detailId').textContent = geId;
    document.getElementById('detailTitle').textContent = entry.title || '';

    // Staleness banner
    const st = stalenessInfo(entry.submitted, entry.staleness_threshold);
    const staleEl = document.getElementById('detailStale');
    if (st && st.level === 'stale') {
      staleEl.innerHTML = `<div class="detail-stale-banner">⚠ Entry is ${st.days} days old — last verified ${entry.submitted || 'unknown'}. Verify before acting.</div>`;
    } else {
      staleEl.innerHTML = '';
    }

    // Fields
    const tags = Array.isArray(entry.tags) ? entry.tags : [];
    const tagsHtml = tags.length
      ? tags.map(t => `<span class="detail-tag">${t}</span>`).join('')
      : '—';

    document.getElementById('detailFields').innerHTML = `
      <span class="detail-field-label">Stack</span>
      <span class="detail-field-value">${entry.stack || '—'}</span>
      <span class="detail-field-label">Score</span>
      <span class="detail-field-value">${entry.score || '—'}/15</span>
      <span class="detail-field-label">Submitted</span>
      <span class="detail-field-value">${entry.submitted || '—'}</span>
      <span class="detail-field-label">Tags</span>
      <div class="detail-tags">${tagsHtml}</div>
    `;

    // Show panel with loading state
    document.getElementById('detailContent').innerHTML = `
      <div class="garden-state" style="padding: 2rem 0;">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p style="margin-top:0.75rem">Loading…</p>
      </div>`;
    panel.classList.add('open');

    // Fetch full entry body
    try {
      const res = await fetch(`${RAW}/${domain}/${geId}.md`);
      if (!res.ok) throw new Error('Not found');
      const content = await res.text();
      const body = parseBody(content);
      document.getElementById('detailContent').innerHTML = renderMarkdown(body);
    } catch {
      document.getElementById('detailContent').innerHTML =
        '<p style="color:var(--sage);font-style:italic">Could not load entry content.</p>';
    }
  };

  window.closeDetail = function() {
    document.getElementById('entryDetail').classList.remove('open');
  };

  // Close panel on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  // ── Simple Markdown renderer ───────────────────────────────────────────────

  function renderMarkdown(md) {
    return md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Code blocks
      .replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
        `<pre><code>${code}</code></pre>`)
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Headings
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Bullet lists
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)+/g, match => `<ul>${match}</ul>`)
      // Paragraphs (double newline)
      .split(/\n{2,}/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (block.startsWith('<')) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
  }

  // ── Data loading ──────────────────────────────────────────────────────────

  async function fetchText(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
    return res.text();
  }

  async function loadGarden() {
    try {
      const gardenMd = await fetchText(`${RAW}/GARDEN.md`);
      const domains = parseDomains(gardenMd);

      if (!domains.length) {
        document.getElementById('entryGrid').innerHTML = `
          <div class="garden-state">
            <div class="garden-state-icon">🌱</div>
            <h3>Garden is empty</h3>
            <p>No domain entries found in GARDEN.md. Check back after entries are merged.</p>
          </div>`;
        document.getElementById('statsLabel').textContent = '0 entries';
        return;
      }

      // Load all domain indexes in parallel
      const domainResults = await Promise.allSettled(
        domains.map(async (domain) => {
          const idx = await fetchText(`${RAW}/${domain}/INDEX.md`).catch(() => '');
          const indexEntries = parseIndex(idx);
          // Enrich with domain; try to fetch frontmatter for metadata
          const enriched = await Promise.allSettled(
            indexEntries.map(async (e) => {
              try {
                const txt = await fetchText(`${RAW}/${domain}/${e.id}.md`);
                const fm = parseFrontmatter(txt);
                return { ...e, ...fm, domain: domain };
              } catch {
                return { ...e, domain: domain };
              }
            })
          );
          return enriched.filter(r => r.status === 'fulfilled').map(r => r.value);
        })
      );

      for (const result of domainResults) {
        if (result.status === 'fulfilled') {
          allEntries = allEntries.concat(result.value);
        }
      }

      // Build Fuse.js search index
      fuse = new Fuse(allEntries, {
        keys: ['title', 'tags', 'stack', 'domain'],
        threshold: 0.35,
        minMatchCharLength: 2,
      });

      const statsEl = document.getElementById('statsLabel');
      statsEl.textContent = `${allEntries.length} ${allEntries.length === 1 ? 'entry' : 'entries'}`;

      buildDomainTabs(domains);
      renderGrid(allEntries);

    } catch (err) {
      document.getElementById('entryGrid').innerHTML = `
        <div class="garden-state">
          <div class="garden-state-icon">⚠</div>
          <h3>Could not load garden</h3>
          <p>The garden may be private or temporarily unavailable. <a href="https://github.com/${GARDEN_REPO}" target="_blank" rel="noopener">View on GitHub</a>.</p>
        </div>`;
      document.getElementById('statsLabel').textContent = 'unavailable';
    }
  }

  // ── Search wiring ─────────────────────────────────────────────────────────

  const searchInput = document.getElementById('searchInput');
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      activeSearch = searchInput.value;
      applyFilters();
    }, 200);
  });

  // ── Boot ──────────────────────────────────────────────────────────────────

  loadGarden();

})();
</script>
